name: CD Pipeline

on:
  push:
    tags: ["v*"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t crash-prediction-api:${{ github.ref_name }} .

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        run: |
          docker tag crash-prediction-api:${{ github.ref_name }} ghcr.io/${{ github.repository_owner }}/crash-prediction-api:${{ github.ref_name }}
          docker push ghcr.io/${{ github.repository_owner }}/crash-prediction-api:${{ github.ref_name }}
