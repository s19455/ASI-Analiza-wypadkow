name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalacja zaleznosci
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install optuna xgboost lightgbm

      - name: Lint (ruff)
        run: ruff check src/

      - name: Testy (pytest)
        run: pytest tests/ -v

      - name: Sprawdzenie pipeline'ow Kedro
        run: kedro registry list
